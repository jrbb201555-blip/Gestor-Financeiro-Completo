kind = "web"
previewPath = "/"
title = "Sistema Financeiro"
version = "1.0.0"
id = "artifacts/financeiro"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25404

[services.development]
run = "pnpm --filter @workspace/financeiro run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/financeiro", "run", "build" ]
serve = "static"
publicDir = "artifacts/financeiro/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25404"
BASE_PATH = "/"
